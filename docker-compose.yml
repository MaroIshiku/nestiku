name: nestiku-startpage

services:
  Nestiku:
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    cpus: 0.5
    cpu_shares: 90
    command: []
    container_name: Nestiku
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "268435456"
          pids: 128
        reservations:
          devices: []
    environment:
      - HOST=0.0.0.0
      - ISHIKU_DATA_DIR=/data
      - ISHIKU_LOG_LEVEL=info
      - ISHIKU_SETUP_SECRET=${ISHIKU_SETUP_SECRET:-}
      - NESTIKU_DATA_DIR=/data
      - NESTIKU_GID=10001
      - NESTIKU_UID=10001
      - NODE_ENV=production
      - PORT=8080
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TZ=Europe/Berlin
    hostname: Nestiku
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:8080/readyz', { signal:
          AbortSignal.timeout(3000) }).then(function (res) { if (!res.ok)
          process.exit(1); }).catch(function () { process.exit(1); })
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    image: ghcr.io/maroishiku/nestiku:latest
    init: true
    labels:
      icon: https://raw.githubusercontent.com/MaroIshiku/nestiku/main/public/assets/nestiku.png
      org.opencontainers.image.description: Private personal startpage with secure first-run setup, link dashboard, search, weather and local JSON storage.
      org.opencontainers.image.source: https://github.com/MaroIshiku/nestiku
      org.opencontainers.image.title: Nestiku - Personal Startpage
      org.opencontainers.image.url: https://github.com/MaroIshiku/nestiku
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
    mem_limit: "268435456"
    pids_limit: 128
    ports:
      - target: 8080
        published: "8503"
        protocol: tcp
    pull_policy: always
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    stop_signal: SIGTERM
    tmpfs:
      - /tmp:size=32m,mode=1777
    volumes:
      - type: bind
        source: /DATA/AppData/ish_nestiku/data
        target: /data
    devices: []
    networks:
      - Nestiku
    privileged: false

networks:
  Nestiku:
    name: Nestiku
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  author: MaroIshiku
  category: Utilities
  description:
    de_de: Private persoenliche Startseite mit sicherem Erst-Setup, Link-Dashboard, Suche, Wetter und lokalem JSON-Speicher.
    en_us: Private personal startpage with secure first-run setup, link dashboard, search, weather and local JSON storage.
  developer: MaroIshiku
  hostname: ""
  icon: https://raw.githubusercontent.com/MaroIshiku/nestiku/main/public/assets/nestiku.png
  index: /
  is_uncontrolled: false
  main: Nestiku
  port_map: "8503"
  scheme: http
  store_app_id: Nestiku
  tagline:
    de_de: Deine ruhige, private und sichere Personal Startpage.
    en_us: Your calm, private and secure personal startpage.
  thumbnail: https://raw.githubusercontent.com/MaroIshiku/nestiku/main/public/assets/nestiku.png
  tips:
    before_install:
      de_de: >
        Pflicht: Setze SESSION_SECRET in .env auf einen langen zufaelligen Wert.
        Setze ISHIKU_SETUP_SECRET vor dem ersten Start auf einen zweiten langen
        zufaelligen Wert.


        Persistente Daten liegen auf dem ZimaOS-Host unter
        /DATA/AppData/ish_nestiku/data und
        werden im Container nach /data gemountet. Der Container laeuft read-only,
        ohne Privilegien und als UID/GID 10001.


        Veroeffentliche die WebUI ueber HTTPS, wenn du die Startpage ausserhalb
        deines lokalen Netzes erreichbar machst.
      en_us: >
        Required: set SESSION_SECRET to a long random value. Set
        ISHIKU_SETUP_SECRET to a second long random value before the first start.


        Persistent data is stored on the ZimaOS host under
        /DATA/AppData/ish_nestiku/data and is
        mounted into the container at /data. The container runs read-only,
        without privileges and as UID/GID 10001.


        Publish the WebUI through HTTPS if you expose the startpage outside your
        local network.
  title:
    custom: Nestiku - Personal Startpage
    de_de: Nestiku
    en_us: Nestiku
