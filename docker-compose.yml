services:
  nestiku:
    build: .
    container_name: nestiku
    restart: unless-stopped
    ports:
      - "8503:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      HOST: "0.0.0.0"
      SESSION_SECRET: "${SESSION_SECRET:?Bitte SESSION_SECRET in .env setzen}"
      ISHIKU_SETUP_SECRET_FILE: "/run/secrets/nestiku_setup_secret"
      NESTIKU_DATA_DIR: "/app/data"
      TZ: "${TZ:-Europe/Berlin}"
    volumes:
      - ./data:/app/data
    secrets:
      - nestiku_setup_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

secrets:
  nestiku_setup_secret:
    file: ./secrets/setup_secret.txt
