<!doctype html>
<html lang="de" data-theme="lavender" data-mode="system" data-resolved-mode="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFFBFF">
  <meta name="color-scheme" content="light dark">
  <title>Anmelden - Nestiku</title>
  <link rel="icon" href="/assets/logos/nestiku.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="icon-sprite" aria-hidden="true"></div>
  <main class="psu-setup-screen">
    <section class="psu-auth-window" aria-labelledby="login-title">
      <div class="psu-setup-brand">
        <div class="psu-setup-logo" aria-hidden="true">
          <img data-psu-app-logo src="/assets/logos/nestiku.png" alt="">
          <svg data-psu-fallback-symbol><use href="#psu-icon-home"></use></svg>
        </div>
        <div>
          <h1 class="psu-setup-title" id="login-title">Nestiku</h1>
          <p class="psu-setup-subtitle">Personal Startpage</p>
        </div>
      </div>

      <form class="psu-form-stack" id="login-form">
        <label class="psu-field">
          <span class="psu-label">Benutzername</span>
          <input class="psu-input" type="text" id="username" name="username" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" required autofocus>
        </label>
        <label class="psu-field">
          <span class="psu-label">Passwort</span>
          <input class="psu-input" type="password" id="password" name="password" autocomplete="current-password" required>
        </label>
        <div class="psu-setup-actions">
          <button class="psu-button psu-button--filled psu-button--full" type="submit" id="submit-btn">Anmelden</button>
        </div>
      </form>
    </section>
  </main>

  <div class="nestiku-toast" data-nestiku-toast role="status" aria-live="polite"></div>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
